services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: construction-app-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/data/construction.db
      - CLIENT_URL=${CLIENT_URL}
    volumes:
      - db-data:/data

volumes:
  db-data:
    name: construction-app-db-data
