version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: construction-app-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_here}
      # DB_PATH is already set in the Dockerfile to /data/database.sqlite
    volumes:
      - db-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This is the URL the client browser will use to connect to the backend.
        # Change this in your .env file if deploying to a remote server.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    container_name: construction-app-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - server

volumes:
  db-data:
    name: construction-app-db-data
